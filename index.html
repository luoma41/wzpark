<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wz park - 旅行相册</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'warm-white': '#FAF9F7',
            'charcoal': '#2D2D2D',
            'mid-gray': '#6B6B6B',
            'moss': '#5A7D5A',
            'sand': '#D4C5B5',
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <style>
    body { background-color: #FAF9F7; color: #2D2D2D; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
    .page { display: none; animation: fadeIn 0.2s ease; }
    .page.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    /* Map artistic markers */
    .travel-marker-wrapper { background: transparent; border: none; }
    .travel-marker {
      background: #5A7D5A;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      color: #FAF9F7;
      box-shadow: 0 2px 8px rgba(45,45,45,0.25);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
    }
    .travel-marker:hover { transform: scale(1.15); box-shadow: 0 4px 14px rgba(45,45,45,0.35); }
    .travel-pin-wrapper { background: transparent; border: none; }
    .travel-pin {
      background: #5A7D5A;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 1px 5px rgba(45,45,45,0.3);
      transition: transform 0.2s ease;
      cursor: pointer;
    }
    .travel-pin:hover { transform: scale(1.2); }
    .travel-pin-count { color: #FAF9F7; font-size: 11px; font-weight: 600; line-height: 1; }
    .travel-cluster-wrapper { background: transparent; border: none; }
    .travel-cluster {
      background: rgba(90,125,90,0.85);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 10px rgba(45,45,45,0.3);
      color: #FAF9F7; font-size: 13px; font-weight: 600;
      border: 2px solid #FAF9F7;
      transition: transform 0.2s ease;
      cursor: pointer;
    }
    .travel-cluster:hover { transform: scale(1.1); }
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav id="navbar" class="fixed top-0 w-full bg-warm-white/90 backdrop-blur-sm border-b border-sand/30 z-50"></nav>

  <!-- Page Container -->
  <main class="pt-16 min-h-screen">
    <!-- Home Page -->
    <div id="page-home" class="page active"></div>
    <!-- Album Page -->
    <div id="page-album" class="page"></div>
    <!-- Share Page -->
    <div id="page-share" class="page"></div>
    <!-- Admin Page -->
    <div id="page-admin" class="page"></div>
    <!-- Upload Page -->
    <div id="page-upload" class="page"></div>
  </main>

  <!-- Leaflet -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <!-- EXIF Reader -->
  <script src="https://cdn.jsdelivr.net/npm/exif-js@2.3.0/exif.min.js"></script>
  <!-- COS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/cos-js-sdk-v5/dist/cos-js-sdk-v5.min.js"></script>

  <!-- App Modules -->
  <script src="/js/utils.js?v=8"></script>
  <script src="/js/api.js?v=8"></script>
  <script src="/js/router.js?v=8"></script>
  <script src="/js/components/navbar.js?v=8"></script>
  <script src="/js/components/map.js?v=8"></script>
  <script src="/js/components/photoGrid.js?v=8"></script>
  <script src="/js/pages/home.js?v=8"></script>
  <script src="/js/pages/album.js?v=8"></script>
  <script src="/js/pages/share.js?v=8"></script>
  <script src="/js/pages/admin.js?v=8"></script>
  <script src="/js/pages/upload.js?v=8"></script>
  <script>
    // Initialize app
    document.addEventListener('DOMContentLoaded', () => {
      window.router.init();
    });
  </script>
</body>
</html>
