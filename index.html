<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wz park - 旅行相册</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'warm-white': '#FAF9F7',
            'charcoal': '#2D2D2D',
            'mid-gray': '#6B6B6B',
            'moss': '#5A7D5A',
            'sand': '#D4C5B5',
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <style>
    body { background-color: #FAF9F7; color: #2D2D2D; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; line-height: 1.6; letter-spacing: 0.01em; }
    html { scroll-behavior: smooth; }
    .page { display: none; }
    .page.active { display: block; animation: pageIn 0.35s cubic-bezier(0.22, 0.61, 0.36, 1); }
    @keyframes pageIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .editorial-overline { font-size: 11px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: #6B6B6B; }
    .editorial-rule { width: 40px; height: 2px; background: #5A7D5A; margin: 0 0 1.5rem 0; }
    /* === Map markers: frosted glass === */
    .travel-marker-wrapper { background: transparent; border: none; }

    /* Frosted glass card (low zoom) */
    .travel-card {
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.85);
      box-shadow: 0 4px 16px rgba(0,0,0,0.10), 0 1px 3px rgba(0,0,0,0.06);
      padding: 8px 14px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      position: relative;
    }
    .travel-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.14), 0 2px 6px rgba(0,0,0,0.08);
    }
    .travel-card::after {
      content: '';
      position: absolute; bottom: -7px; left: 50%; transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
      border-top: 7px solid rgba(255, 255, 255, 0.78);
    }
    .travel-card-label {
      font-size: 12px; font-weight: 600; color: #2D2D2D;
      line-height: 1.2; white-space: nowrap;
    }

    /* Pin markers (high zoom) */
    .travel-pin-wrapper { background: transparent; border: none; }
    .travel-pin {
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1.5px solid rgba(255, 255, 255, 0.9);
      box-shadow: 0 3px 10px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.06);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .travel-pin:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.18), 0 2px 4px rgba(0,0,0,0.08);
    }
    .travel-pin-count {
      color: #5A7D5A; font-size: 12px; font-weight: 700; line-height: 1;
    }

    /* Cluster markers */
    .travel-cluster-wrapper { background: transparent; border: none; }
    .travel-cluster {
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 2px solid rgba(90, 125, 90, 0.5);
      box-shadow: 0 4px 18px rgba(0,0,0,0.14), 0 1px 3px rgba(0,0,0,0.06);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .travel-cluster:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.18), 0 2px 6px rgba(0,0,0,0.08);
    }
    .travel-cluster-count {
      color: #5A7D5A; font-weight: 700; line-height: 1;
    }
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav id="navbar" class="fixed top-0 w-full bg-warm-white/90 backdrop-blur-sm border-b border-sand/30 z-50"></nav>

  <!-- Page Container -->
  <main class="pt-12 min-h-screen">
    <!-- Home Page -->
    <div id="page-home" class="page active"></div>
    <!-- Album Page -->
    <div id="page-album" class="page"></div>
    <!-- Share Page -->
    <div id="page-share" class="page"></div>
    <!-- Admin Page -->
    <div id="page-admin" class="page"></div>
    <!-- Upload Page -->
    <div id="page-upload" class="page"></div>
  </main>

  <!-- Leaflet -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <!-- EXIF Reader -->
  <script src="https://cdn.jsdelivr.net/npm/exif-js@2.3.0/exif.min.js"></script>
  <!-- COS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/cos-js-sdk-v5/dist/cos-js-sdk-v5.min.js"></script>

  <!-- App Modules -->
  <script src="/js/utils.js?v=16"></script>
  <script src="/js/api.js?v=16"></script>
  <script src="/js/router.js?v=16"></script>
  <script src="/js/components/navbar.js?v=16"></script>
  <script src="/js/components/map.js?v=16"></script>
  <script src="/js/components/photoGrid.js?v=16"></script>
  <script src="/js/pages/home.js?v=16"></script>
  <script src="/js/pages/album.js?v=18"></script>
  <script src="/js/pages/share.js?v=16"></script>
  <script src="/js/pages/admin.js?v=16"></script>
  <script src="/js/pages/upload.js?v=16"></script>
  <script>
    // Initialize app
    document.addEventListener('DOMContentLoaded', () => {
      window.router.init();
    });
  </script>
</body>
</html>
