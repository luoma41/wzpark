<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>wz park - 旅行相册</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'warm-white': '#FAF9F7',
            'charcoal': '#2D2D2D',
            'mid-gray': '#6B6B6B',
            'moss': '#5A7D5A',
            'sand': '#D4C5B5',
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <style>
    body { background-color: #FAF9F7; color: #2D2D2D; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
    .page { display: none; animation: fadeIn 0.2s ease; }
    .page.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    /* === Map markers: frosted glass + 3D sphere === */
    .travel-marker-wrapper { background: transparent; border: none; }

    /* Frosted glass card */
    .travel-card {
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.85);
      box-shadow: 0 4px 16px rgba(0,0,0,0.10), 0 1px 3px rgba(0,0,0,0.06);
      padding: 8px 10px 6px;
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      position: relative;
    }
    .travel-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.14), 0 2px 6px rgba(0,0,0,0.08);
    }
    .travel-card::after {
      content: '';
      position: absolute; bottom: -7px; left: 50%; transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
      border-top: 7px solid rgba(255, 255, 255, 0.78);
    }

    /* 3D sphere inside card */
    .travel-sphere {
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #8CB88C 0%, #5A7D5A 45%, #3D5C3D 100%);
      box-shadow: inset 0 -2px 4px rgba(0,0,0,0.12), 0 2px 6px rgba(0,0,0,0.10);
      display: flex; align-items: center; justify-content: center;
      position: relative; flex-shrink: 0;
    }
    .travel-sphere::after {
      content: '';
      position: absolute; width: 20%; height: 20%;
      background: rgba(255, 255, 255, 0.6); border-radius: 50%;
      top: 15%; left: 28%;
    }

    .travel-card-label {
      font-size: 11px; font-weight: 600; color: #2D2D2D;
      line-height: 1.2; white-space: nowrap;
      max-width: 80px; overflow: hidden; text-overflow: ellipsis;
    }

    /* Pin markers (high zoom) */
    .travel-pin-wrapper { background: transparent; border: none; }
    .travel-pin {
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1.5px solid rgba(255, 255, 255, 0.9);
      box-shadow: 0 3px 10px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.06);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .travel-pin:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.18), 0 2px 4px rgba(0,0,0,0.08);
    }
    .travel-pin-inner {
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #8CB88C 0%, #5A7D5A 50%, #3D5C3D 100%);
      box-shadow: inset 0 -1px 3px rgba(0,0,0,0.15);
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .travel-pin-inner::after {
      content: '';
      position: absolute; width: 18%; height: 18%;
      background: rgba(255, 255, 255, 0.55); border-radius: 50%;
      top: 14%; left: 27%;
    }
    .travel-pin-count {
      color: #FAF9F7; font-size: 11px; font-weight: 700; line-height: 1;
      position: relative; z-index: 1;
      text-shadow: 0 1px 1px rgba(0,0,0,0.2);
    }

    /* Cluster markers */
    .travel-cluster-wrapper { background: transparent; border: none; }
    .travel-cluster {
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 2px solid rgba(90, 125, 90, 0.5);
      box-shadow: 0 4px 18px rgba(0,0,0,0.14), 0 1px 3px rgba(0,0,0,0.06);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .travel-cluster:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.18), 0 2px 6px rgba(0,0,0,0.08);
    }
    .travel-cluster-inner {
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #8CB88C 0%, #5A7D5A 50%, #3D5C3D 100%);
      box-shadow: inset 0 -2px 4px rgba(0,0,0,0.12);
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .travel-cluster-inner::after {
      content: '';
      position: absolute; width: 18%; height: 18%;
      background: rgba(255, 255, 255, 0.55); border-radius: 50%;
      top: 14%; left: 27%;
    }
    .travel-cluster-count {
      color: #FAF9F7; font-weight: 700; line-height: 1;
      position: relative; z-index: 1;
      text-shadow: 0 1px 1px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav id="navbar" class="fixed top-0 w-full bg-warm-white/90 backdrop-blur-sm border-b border-sand/30 z-50"></nav>

  <!-- Page Container -->
  <main class="pt-16 min-h-screen">
    <!-- Home Page -->
    <div id="page-home" class="page active"></div>
    <!-- Album Page -->
    <div id="page-album" class="page"></div>
    <!-- Share Page -->
    <div id="page-share" class="page"></div>
    <!-- Admin Page -->
    <div id="page-admin" class="page"></div>
    <!-- Upload Page -->
    <div id="page-upload" class="page"></div>
  </main>

  <!-- Leaflet -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <!-- EXIF Reader -->
  <script src="https://cdn.jsdelivr.net/npm/exif-js@2.3.0/exif.min.js"></script>
  <!-- COS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/cos-js-sdk-v5/dist/cos-js-sdk-v5.min.js"></script>

  <!-- App Modules -->
  <script src="/js/utils.js?v=9"></script>
  <script src="/js/api.js?v=9"></script>
  <script src="/js/router.js?v=9"></script>
  <script src="/js/components/navbar.js?v=9"></script>
  <script src="/js/components/map.js?v=9"></script>
  <script src="/js/components/photoGrid.js?v=9"></script>
  <script src="/js/pages/home.js?v=9"></script>
  <script src="/js/pages/album.js?v=9"></script>
  <script src="/js/pages/share.js?v=9"></script>
  <script src="/js/pages/admin.js?v=9"></script>
  <script src="/js/pages/upload.js?v=9"></script>
  <script>
    // Initialize app
    document.addEventListener('DOMContentLoaded', () => {
      window.router.init();
    });
  </script>
</body>
</html>
